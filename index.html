<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS — Soluciones de Ingeniería Sostenible</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --amber: #F59E0B;
  --amber-l: #FCD34D;
  --amber-d: #B45309;
  --amber-glow: rgba(245,158,11,0.15);
  --amber-glow2: rgba(245,158,11,0.08);
  --ink: #0C0F18;
  --ink2: #131829;
  --ink3: #1A2236;
  --ink4: #222C42;
  --line: rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.12);
  --txt: #E8EDF5;
  --txt2: rgba(232,237,245,0.55);
  --txt3: rgba(232,237,245,0.28);
  --green: #34D399;
  --radius: 16px;
  --radius-sm: 10px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Lato', sans-serif;
  background: var(--ink);
  color: var(--txt);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

.glow-tr {
  position: fixed; top: -200px; right: -200px;
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.glow-bl {
  position: fixed; bottom: -150px; left: -150px;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(96,165,250,0.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 3rem 2rem;
  max-width: 560px;
  width: 100%;
  animation: fadeUp 0.6s ease both;
}

/* LOGO */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-bottom: 3rem;
}

.logo-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--amber), var(--amber-d));
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
  box-shadow: 0 8px 40px rgba(245,158,11,0.4), 0 0 0 1px rgba(245,158,11,0.2);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 40px rgba(245,158,11,0.4), 0 0 0 1px rgba(245,158,11,0.2); }
  50%       { box-shadow: 0 8px 60px rgba(245,158,11,0.6), 0 0 0 1px rgba(245,158,11,0.35); }
}

.logo-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(3.5rem, 12vw, 5.5rem);
  letter-spacing: -0.04em;
  color: var(--txt);
  line-height: 1;
}

.logo-tagline {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--txt3);
  margin-top: -4px;
}

/* DIVIDER */
.divider {
  width: 40px; height: 2px;
  background: linear-gradient(to right, transparent, var(--amber), transparent);
  margin: 0 auto 2.8rem;
}

/* NAV BUTTONS */
.nav-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 1.2rem 1.6rem;
  border-radius: var(--radius);
  border: 1px solid var(--line2);
  background: var(--ink2);
  color: var(--txt);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
}

.nav-btn:hover {
  border-color: var(--amber);
  background: linear-gradient(135deg, rgba(245,158,11,0.06) 0%, var(--ink2) 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,158,11,0.15);
}

.nav-btn.secondary:hover {
  border-color: var(--line2);
  background: var(--ink3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.btn-icon {
  width: 44px; height: 44px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.nav-btn:not(.secondary) .btn-icon {
  background: linear-gradient(135deg, var(--amber), var(--amber-d));
  box-shadow: 0 4px 16px rgba(245,158,11,0.3);
}

.nav-btn.secondary .btn-icon {
  background: var(--ink3);
  border: 1px solid var(--line2);
}

.btn-text .bt-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--txt);
  display: block;
}

.btn-text .bt-desc {
  font-size: 0.72rem;
  color: var(--txt3);
  margin-top: 3px;
  display: block;
}

.btn-arrow {
  margin-left: auto;
  color: var(--txt3);
  font-size: 0.85rem;
  transition: transform 0.2s, color 0.2s;
  flex-shrink: 0;
}

.nav-btn:hover .btn-arrow {
  transform: translateX(4px);
  color: var(--amber);
}

.nav-btn.secondary:hover .btn-arrow {
  color: var(--txt2);
}

/* FOOTER */
.home-footer {
  margin-top: 3rem;
  font-size: 0.62rem;
  color: var(--txt3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .logo-name { font-size: 3.5rem; }
}
</style>
</head>
<body>

<div class="glow-tr"></div>
<div class="glow-bl"></div>

<div class="container">

  <div class="logo">
    <div class="logo-icon">☀</div>
    <div>
      <div class="logo-name">SIS</div>
      <div class="logo-tagline">Soluciones de Ingeniería Sostenible</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="nav-buttons">
    <a class="nav-btn" href="cotizador-rapido.html">
      <div class="btn-icon">⚡</div>
      <div class="btn-text">
        <span class="bt-title">Cotizador Rápido</span>
        <span class="bt-desc">Tu precio y ahorro en segundos · solo ingresa kWh y factura</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <a class="nav-btn secondary" href="cotizador.html">
      <div class="btn-icon">🔧</div>
      <div class="btn-text">
        <span class="bt-title">Cotizador Detallado</span>
        <span class="bt-desc">Elige inversor, estructura y acabado · desglose completo de materiales</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <a class="nav-btn secondary" href="contacto.html">
      <div class="btn-icon">📞</div>
      <div class="btn-text">
        <span class="bt-title">Contacto</span>
        <span class="bt-desc">Habla con un ingeniero de SIS</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <div class="home-footer">Guatemala · Energía Solar · &copy; 2026 SIS</div>

</div>

</body>
</html>
